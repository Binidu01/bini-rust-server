name: Build Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bini-rust-server-windows-x64.exe
            binary_name: bini-rust-server.exe

          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: bini-rust-server-macos-x64
            binary_name: bini-rust-server

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bini-rust-server-macos-arm64
            binary_name: bini-rust-server

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bini-rust-server-linux-x64
            binary_name: bini-rust-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux only)
        if: runner.os == 'Linux'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Rename and stage binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename and stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${{ matrix.artifact }}"

      - name: Verify binary exists and is non-empty
        shell: bash
        run: |
          if [ ! -s "${{ matrix.artifact }}" ]; then
            echo "ERROR: Binary ${{ matrix.artifact }} is missing or empty!"
            exit 1
          fi
          echo "Binary verified: $(du -sh ${{ matrix.artifact }})"

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries for upload
        run: |
          mkdir -p release_files

          EXPECTED=(
            "bini-rust-server-linux-x64"
            "bini-rust-server-macos-arm64"
            "bini-rust-server-macos-x64"
            "bini-rust-server-windows-x64.exe"
          )

          for name in "${EXPECTED[@]}"; do
            src="artifacts/$name/$name"
            if [ ! -f "$src" ]; then
              echo "ERROR: Expected binary not found: $src"
              exit 1
            fi
            cp "$src" "release_files/$name"
            echo "Staged: $name"
          done

          echo "All binaries staged:"
          ls -lh release_files/

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          cd release_files
          {
            echo 'CHECKSUMS<<EOF'
            for f in bini-rust-server-linux-x64 bini-rust-server-macos-arm64 bini-rust-server-macos-x64 bini-rust-server-windows-x64.exe; do
              if [ ! -f "$f" ]; then
                echo "ERROR: $f missing during checksum step"
                exit 1
              fi
              sha=$(sha256sum "$f" | awk '{print $1}')
              size=$(stat -c%s "$f" | numfmt --to=iec-i --suffix=B)
              echo "| \`$f\` | $size | \`sha256:$sha\` |"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## Downloads

            | Binary | Size | Checksum |
            |--------|------|----------|
            ${{ steps.checksums.outputs.CHECKSUMS }}

            > Verify integrity with `sha256sum <file>` (Linux/macOS) or `Get-FileHash <file>` (Windows).