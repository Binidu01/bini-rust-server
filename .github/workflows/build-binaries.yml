name: Build Binaries

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: bini-rust-server-windows-x64.exe
            binary_name: bini-rust-server.exe

          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: bini-rust-server-macos-x64
            binary_name: bini-rust-server

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: bini-rust-server-macos-arm64
            binary_name: bini-rust-server

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: bini-rust-server-linux-x64
            binary_name: bini-rust-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display downloaded file structure
        run: ls -R artifacts

      - name: Organize binaries for upload
        run: |
          mkdir -p release_files
          find artifacts -type f -name 'bini-rust-server*' -exec cp {} release_files/ \;
          echo "Files to be uploaded:"
          ls -la release_files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release_files/*
          generate_release_notes: true
          fail_on_unmatched_files: false